<!DOCTYPE html>
<html>

<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Premium champagne gold gradient requested by the user */
            --gold-gradient: linear-gradient(135deg, #fef1c9 0%, #fce2a1 30%, #e6be65 50%, #f3d68b 75%, #fffbf0 100%);
            /* Unified solid golden accent color selected from the champagne palette for crisp symbol rendering */
            --gold-solid: #fce2a1;
        }

        body {
            background: #1c1a17;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            gap: 36px;
        }

        .card-label {
            font-size: 8px;
            letter-spacing: 0.38em;
            text-transform: uppercase;
            color: rgba(252, 226, 161, 0.35);
            text-align: center;
        }

        /* Strict physical aspect ratio and boundary limits */
        .card {
            width: 340px;
            height: 194px;
            background: #0d0d0d;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.9),
                0 6px 20px rgba(0, 0, 0, 0.7),
                0 20px 44px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.025);
        }

        /* Global Gold Color classes */
        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: var(--gold-solid);
        }

        /* ── FRONT ── */
        .card-front .pattern-band {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 25%;
            background: rgba(255, 255, 255, 0.016);
            border-right: 1px solid rgba(252, 226, 161, 0.09);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 10px 0;
        }

        /* Uniform styling for ambient symbols in background */
        .pattern-band svg {
            fill: var(--gold-solid);
            color: var(--gold-solid);
            opacity: 0.38;
        }

        .card-front .brand-zone {
            position: absolute;
            left: 25%;
            right: 0;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            /* Brought the front text elements slightly lower as requested */
            transform: translateY(12px);
        }

        .company-name {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 27px;
            font-weight: 400;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            line-height: 1;
            display: block;
            white-space: nowrap;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: var(--gold-solid);
        }

        .company-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 7px;
            font-weight: 500;
            letter-spacing: 0.46em;
            text-transform: uppercase;
            color: var(--gold-solid);
            opacity: 0.85;
            display: block;
            white-space: nowrap;
        }

        /* ── BACK ── */
        .card-back {
            padding: 18px 20px 16px 20px;
            display: flex;
            flex-direction: column;
        }

        .back-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .name-block {
            display: flex;
            flex-direction: column;
        }

        .partner-name {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin-bottom: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: var(--gold-solid);
        }

        .partner-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 6.8px;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: var(--gold-solid);
            opacity: 0.72;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 2px;
        }

        /* Clean branding color for active symbols */
        .icon-row svg {
            fill: var(--gold-solid);
            color: var(--gold-solid);
            opacity: 0.88;
            flex-shrink: 0;
        }

        .contact-info {
            font-family: 'Montserrat', sans-serif;
            font-size: 6.8px;
            font-weight: 400;
            line-height: 1.85;
            letter-spacing: 0.06em;
            color: var(--gold-solid);
            opacity: 0.78;
            margin-top: 14px;
        }

        .cities-row {
            margin-top: auto;
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .cities-row span {
            font-family: 'Montserrat', sans-serif;
            font-size: 6.8px;
            font-weight: 500;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--gold-solid);
            opacity: 0.82;
        }

        .cities-row .sep {
            width: 1px;
            height: 8px;
            background: rgba(252, 226, 161, 0.25);
            opacity: 1;
        }

        /* Decorative footer section on the bottom right of the card back */
        .bottom-anchor {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32%;
            height: 18%;
            background: rgba(255, 255, 255, 0.012);
            border-top: 1px solid rgba(252, 226, 161, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            overflow: hidden;
            padding: 0 6px;
        }

        .bottom-anchor svg {
            fill: var(--gold-solid);
            color: var(--gold-solid);
            opacity: 0.22;
        }

        /* ── PRINT OPTIMIZATION STYLES ── */
        @media print {
            body {
                background: none !important;
                padding: 0 !important;
                margin: 0 !important;
                display: block !important;
            }

            .card-label {
                display: none !important;
            }

            .card {
                width: 3.5in !important;
                height: 2in !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                margin: 0 auto 0.5in auto !important;
                /* Spacing between cards on preview/print sheets */
                page-break-after: always !important;
                page-break-inside: avoid !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
